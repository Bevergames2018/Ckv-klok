<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKV Klok</title>
    <script src="./script.js"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="wrapper">
        <div class="selectDiv" id="selectDiv">
                <div class="setTitle">Settings</div>
                <div class="digitwrap">
                    <button onClick="toggleAllOnes()" class="switchBtn">
                        <code id="allOnesState">[ ]</code>
                        ​ All 1's
                    </button>
                    <button onClick="toggle24HourFormat()" class="switchBtn"> 
                        <code id="24hrsState">[ ]</code>
                        ​ 24-Hour Format
                    </button>
                </div>
        </div>
        <pre class="pre" id="pre">
            <code id="digits" class="time"></code>
        </pre>
    </div>
</body>
</html>
